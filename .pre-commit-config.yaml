repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0
    hooks:
      - id: mypy
        args: ["src/bb_assistant", "--ignore-missing-imports"]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.7,<3.0
          - sqlalchemy>=2.0,<3.0
          - httpx>=0.27,<1.0
          - jinja2>=3.1,<4.0
          - streamlit>=1.35,<2.0
